services:
  mysql:
    image: mysql:8.0.32
    container_name: icehrm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-icehrm_root_password}
      MYSQL_DATABASE: ${DB_NAME:-icehrm}
      MYSQL_USER: ${DB_USER:-icehrm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-icehrm}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-icehrm_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - icehrm-network

  icehrm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: icehrm-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5555}:8080"
    environment:
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:5555}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_NAME=${DB_NAME:-icehrm}
      - DB_USER=${DB_USER:-icehrm}
      - DB_PASSWORD=${DB_PASSWORD:-icehrm}
    volumes:
      - app_data:/var/www/html/app/data
    depends_on:
      mysql:
        condition: service_healthy
        required: false
    networks:
      - icehrm-network

  icehrm-worker:
    build:
      context: .
      dockerfile: Dockerfile-worker
      args:
        - EXE_ENV=prod
    container_name: icehrm-worker
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST:-mysql}
      - DB_NAME=${DB_NAME:-icehrm}
      - DB_USER=${DB_USER:-icehrm}
      - DB_PASSWORD=${DB_PASSWORD:-icehrm}
    volumes:
      - app_data:/var/www/html/app/data
    depends_on:
      - icehrm
    networks:
      - icehrm-network

volumes:
  mysql_data:
    name: icehrm-mysql-data
  app_data:
    name: icehrm-app-data

networks:
  icehrm-network:
    name: icehrm-network
    driver: bridge
